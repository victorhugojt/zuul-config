[loggers]
keys=root,zuul

[handlers]
keys=console

[formatters]
keys=simple

[logger_root]
level=WARNING
handlers=console

[logger_zuul]
level=DEBUG
handlers=console
qualname=zuul
propagate=0

[handler_console]
class=StreamHandler
level=DEBUG
formatter=simple
args=(sys.stderr,)

[formatter_simple]
format=%(asctime)s %(levelname)s %(name)s: %(message)s

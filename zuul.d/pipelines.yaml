- pipeline:
    name: check
    description: |
      Newly opened pull requests enter this pipeline for an initial
      check vote.
    manager: independent
    trigger:
      github:
        - event: pull_request
          action:
            - opened
            - changed
            - reopened
        - event: push
          ref: ^refs/heads/main$
    start:
      github:
        check: in_progress
        comment: false
    success:
      github:
        check: success
        comment: false
    failure:
      github:
        check: failure
        comment: true

- pipeline:
    name: gate
    description: |
      Changes that have been approved are enqueued in order in this
      pipeline, and if they pass tests, will be merged.
    manager: dependent
    supercedes: check
    trigger:
      github:
        - event: pull_request_review
          action: submitted
          state: approved
    require:
      github:
        review:
          - type: approved
        status:
          - context: "zuul:check"
            state: success
    start:
      github:
        check: in_progress
    success:
      github:
        check: success
        merge: true
    failure:
      github:
        check: failure

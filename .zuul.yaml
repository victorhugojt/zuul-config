---
- pipeline:
    name: check
    description: Validate pull requests automatically
    manager: independent
    trigger:
      github:
        - event: pull_request
          action:
            - opened
            - changed
            - reopened
        - event: push
          ref: ^refs/heads/main$
    start:
      github:
        check: in_progress
        comment: false
    success:
      github:
        check: success
        comment: false
    failure:
      github:
        check: failure
        comment: true

- pipeline:
    name: gate
    description: Merge approved and tested pull requests
    manager: dependent
    supercedes: check
    trigger:
      github:
        - event: pull_request_review
          action: submitted
          state: approved
    require:
      github:
        review:
          - type: approved
        status:
          - context: "zuul:check"
            state: success
    start:
      github:
        check: in_progress
    success:
      github:
        check: success
        merge: true
    failure:
      github:
        check: failure

- job:
    name: base
    parent: null
    description: Base job — shared node, setup and teardown for all repos
    run: playbooks/base.yaml
    post-run: playbooks/post-base.yaml
    timeout: 1800
    nodeset:
      nodes:
        - name: controller
          label: linux-executor

- project:
    name: victorhugojt/zuul-config
    check:
      jobs:
        - base

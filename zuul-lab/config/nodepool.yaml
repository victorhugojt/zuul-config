---
# ===========================================================================
# Nodepool config - Uses "static" driver for lab (no cloud needed)
# For your GCP free tier, we use the local VM as the executor node
# ===========================================================================

zookeeper-servers:
  - host: zookeeper
    port: 2181

webapp:
  listen_address: '0.0.0.0'
  port: 8005

providers:
  - name: local-static
    driver: static
    pools:
      - name: main
        nodes:
          - name: zuul-node
            labels:
              - linux-executor
            host: zuul-node       # Dedicated worker node container
            username: zuul
            connection-port: 22
            host-key-checking: false

labels:
  - name: linux-executor
    min-ready: 1

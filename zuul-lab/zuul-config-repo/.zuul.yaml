---
# ===========================================================================
# Zuul Pipeline & Job Definitions
# Repo: victorhugojt/zuul-config
# ===========================================================================

# ---------------------------------------------------------------------------
# CHECK pipeline - runs on every PR and push
# ---------------------------------------------------------------------------
- pipeline:
    name: check
    description: Validate pull requests automatically
    manager: independent
    trigger:
      github:
        - event: pull_request
          action:
            - opened
            - changed
            - reopened
        - event: push
          ref: ^refs/heads/main$
    start:
      github:
        check: in_progress
        comment: false
    success:
      github:
        check: success
        comment: false
    failure:
      github:
        check: failure
        comment: true

# ---------------------------------------------------------------------------
# GATE pipeline - merges approved PRs
# ---------------------------------------------------------------------------
- pipeline:
    name: gate
    description: Merge approved and tested pull requests
    manager: dependent
    trigger:
      github:
        - event: pull_request_review
          action: submitted
          state: approved
    start:
      github:
        check: in_progress
    success:
      github:
        check: success
        merge: true
    failure:
      github:
        check: failure

# ---------------------------------------------------------------------------
# BASE job - all jobs inherit from this
# ---------------------------------------------------------------------------
- job:
    name: base
    parent: null
    description: Base job with common setup
    run: playbooks/base.yaml
    post-run: playbooks/post-base.yaml
    timeout: 1800
    nodeset:
      nodes:
        - name: controller
          label: linux-executor

# ---------------------------------------------------------------------------
# Jobs for recordtec (backend)
# ---------------------------------------------------------------------------
- job:
    name: recordtec-check
    parent: base
    description: Check job for recordtec backend
    run: playbooks/recordtec-check.yaml

- job:
    name: recordtec-lint
    parent: base
    description: Lint job for recordtec backend
    run: playbooks/recordtec-lint.yaml

# ---------------------------------------------------------------------------
# Jobs for recordtec-fe (frontend)
# ---------------------------------------------------------------------------
- job:
    name: recordtec-fe-check
    parent: base
    description: Check job for recordtec frontend
    run: playbooks/recordtec-fe-check.yaml

- job:
    name: recordtec-fe-lint
    parent: base
    description: Lint job for recordtec frontend
    run: playbooks/recordtec-fe-lint.yaml

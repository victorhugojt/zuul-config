---
# ===========================================================================
# Add this file as .zuul.yaml in the ROOT of victorhugojt/recordtec
#
# HYBRID APPROACH: GitHub Actions handles build/test/deploy
# Zuul handles gating (controlled merge) and cross-repo coordination
# ===========================================================================
- project:
    name: victorhugojt/recordtec
    check:
      jobs:
        - recordtec-check     # Zuul validation (complements GitHub Actions)
    gate:
      jobs:
        - recordtec-check     # Must pass before Zuul merges the PR
